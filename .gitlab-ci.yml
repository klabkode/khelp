stages:
  - deploy

variables:
  KHELP_SITE_REPO: "https://x-access-token:${KHELP_GITHUB_TOKEN}@github.com/klabkode/khelp.git"
  KHELP_SITE_BRANCH: "master"

deploy:
  stage: deploy
  image: ubuntu:24.04
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: always
    - when: never
  script:
    - apt-get update -qq
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends git ca-certificates
    - git config --global user.email "klabot@gitlab"
    - git config --global user.name "Klab Bot"
    - export GIT_TERMINAL_PROMPT=0
    - git remote add github "$KHELP_SITE_REPO"
    - git fetch origin "$CI_COMMIT_BRANCH:refs/heads/$CI_COMMIT_BRANCH"
    - git push -f github "$CI_COMMIT_BRANCH:$KHELP_SITE_BRANCH"
